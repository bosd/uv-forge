version: 2
updates:
  # Keep this repo's own GitHub Actions (ci.yml, auto-merge) SHA pins current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Keep the documentation build dependencies current.
  - package-ecosystem: pip
    directory: /docs
    schedule:
      interval: weekly
    groups:
      docs:
        patterns: ["*"]
