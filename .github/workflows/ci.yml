name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  generate:
    name: ${{ matrix.extension }} / ${{ matrix.docs_host }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension: [none, mypyc]
        docs_host: [readthedocs, github-pages]
    steps:
      - name: Check out the template
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - name: Generate a project
        env:
          EXTENSION: ${{ matrix.extension }}
          DOCS_HOST: ${{ matrix.docs_host }}
        run: >-
          uvx --with jinja2-time copier copy --defaults --trust
          --data extension="$EXTENSION"
          --data docs_host="$DOCS_HOST"
          --vcs-ref HEAD . "$RUNNER_TEMP/out"
      - name: Initialize git in the generated project
        working-directory: ${{ runner.temp }}/out
        run: |
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          git add -A
          git commit -qm "Initial commit"
      - name: Run checks on the generated project
        working-directory: ${{ runner.temp }}/out
        run: |
          uv run nox -s pre-commit ty docs-build
          uv run nox -s tests mypy -p 3.13
      - name: Run compiled tests
        if: matrix.extension == 'mypyc'
        working-directory: ${{ runner.temp }}/out
        run: uv run nox -s tests_compiled

  # Single required check to gate merges on (covers the whole matrix).
  ci-success:
    name: ci-success
    if: always()
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix job failed
        if: needs.generate.result != 'success'
        run: exit 1
      - name: All matrix jobs succeeded
        run: echo "CI matrix passed."
